# Simple Drive configuration. Every value can be overridden with environment
# variables so deployments never need to edit this file.
shared:
  # Which backend new blobs are written to: s3, database, local or ftp.
  # Retrieval always uses the backend recorded when the blob was stored.
  backend: <%= ENV.fetch("STORAGE_BACKEND", "local") %>

  # Maximum decoded blob size in bytes. The request-size middleware derives
  # its pre-parse ceiling from the same variable.
  max_blob_bytes: <%= ENV.fetch("MAX_BLOB_BYTES", 26_214_400) %>

  local:
    path: <%= ENV.fetch("LOCAL_STORAGE_PATH", Rails.root.join("storage", "blobs")) %>

  s3:
    endpoint: <%= ENV["S3_ENDPOINT"] %>
    bucket: <%= ENV["S3_BUCKET"] %>
    region: <%= ENV.fetch("S3_REGION", "us-east-1") %>
    access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
    secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
    # Seconds before an unresponsive endpoint fails the request.
    open_timeout: <%= ENV.fetch("S3_OPEN_TIMEOUT", 5) %>
    read_timeout: <%= ENV.fetch("S3_READ_TIMEOUT", 30) %>
    write_timeout: <%= ENV.fetch("S3_WRITE_TIMEOUT", 30) %>

  ftp:
    host: <%= ENV["FTP_HOST"] %>
    port: <%= ENV.fetch("FTP_PORT", 21) %>
    user: <%= ENV["FTP_USER"] %>
    password: <%= ENV["FTP_PASSWORD"] %>
    base_dir: <%= ENV["FTP_BASE_DIR"] %>
    # FTPS (explicit TLS). Set FTP_TLS=false only for servers without TLS,
    # accepting that credentials and content then travel in cleartext.
    tls: <%= ENV.fetch("FTP_TLS", "true") %>

test:
  max_blob_bytes: 1048576
  local:
    path: <%= Rails.root.join("tmp", "test_storage") %>
