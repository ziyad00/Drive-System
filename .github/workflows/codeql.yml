name: CodeQL

# Merge + weekly tier: semantic dataflow analysis is the slowest scanner,
# so it guards main and re-runs weekly (new queries ship continuously)
# instead of blocking every PR.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ruby, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
